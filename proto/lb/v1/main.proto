syntax = "proto3";

package lb.v1;

option go_package = "github.com/akash-biswas-dev/grpc-lb/gen/lb/v1;genlbv1";

// The LoadBalancer service handles discovery and coordination.
service LoadBalancerService {
  rpc GetAddress(GetAddressRequest) returns (GetAddressResponse);
  rpc GetServers(GetServersRequest) returns (GetServersResponse);
  // 1. Backend Registration (Server-side)
  // Backends (Service B) call this to join the pool.
  // Using a stream allows the LB to detect a disconnect immediately.
  rpc Register(stream RegisterRequest) returns (RegisterResponse);

  // 2. Client Watcher (Client-side)
  // Clients (Service A) call this to get live updates of available backends.
  // Bidirectional so the client can also report local "Channel Health" to the LB.
  rpc WatchServer(WatchServerRequest) returns (stream WatchServerResponse);
}

message GetAddressRequest {
  string service_id = 1;
}

message GetAddressResponse {
  string address = 1;
}

message GetServersRequest {
  string service_id = 1;
}

message GetServersResponse {
  repeated string address = 1;
}

// --- Registration Messages ---

message RegisterRequest {
  string service_id = 1; // Key for each service.
  string address = 2;
  map<string, string> metadata = 3; // For versioning or region info
}

message RegisterResponse {
  optional string err = 1;
}

// --- Watcher Messages ---

message WatchServerRequest {
  string service_id = 1; // e.g., "service-b"
  string client_id = 2; // Unique ID for Service A instance
}

message WatchServerResponse {
  enum Action {
    ACTION_UNSPECIFIED = 0;
    ACTION_ADD = 1;
    ACTION_REMOVE = 2;
    ACTION_UPDATE = 3;
  }

  Action action = 1;
  BackendInstance instance = 2;
}

message BackendInstance {
  string address = 1;
}
